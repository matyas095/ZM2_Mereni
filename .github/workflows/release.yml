  create-release:
    needs:
      - build-statistika-linux
      - build-grafy-linux
      - build-statistika-windows
      - build-grafy-windows
      - build-statistika-macos
      - build-grafy-macos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v7

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          body: |
            # ZM2_Mereni ${{ github.ref_name }}

            Nástroj pro statistické zpracování fyzikálních laboratorních měření (ZM2 FJFI ČVUT).

            ## Stažení

            | Balík | Linux | Windows | macOS |
            |-------|-------|---------|-------|
            | **Statistika** (výpočty) | `statistika_*_linux.tar.gz` + `Statistika-*.AppImage` | `statistika_*_windows.zip` | `statistika_*_macos.tar.gz` |
            | **Grafy** (vizualizace) | `statistika_grafy_*_linux.tar.gz` | `statistika_grafy_*_windows.zip` | `statistika_grafy_*_macos.tar.gz` |
            | **Docker** | `docker pull ghcr.io/matyas095/zm2_mereni:${{ github.ref_name }}` | | |

            ## Metody

            **Statistika** (9 metod)

            | Metoda | Alias | Co dělá |
            |--------|-------|---------|
            | `aritmeticky_prumer` | `ap` | Průměr + chyba (typ A, B, kombinovaná dle GUM) |
            | `neprima_chyba` | `nc` | Propagace chyby přes parciální derivace |
            | `vazeny_prumer` | `vp` | Vážený průměr pro měření s rozdílnou přesností |
            | `regrese` | `reg` | Lineární regrese bez grafu (a, b, R², kovariance, χ²) |
            | `derivace` | `der` | Numerická derivace (central differences) |
            | `convert_soubor` | `cs` | Konverze TSV/CASSY do formátu `VELIČINA=data` |
            | `join_tables` | `jt` | Spojení dvou LaTeX tabulek (horizontal / match) |
            | `format_table` | `ft` | Úprava LaTeX tabulky (jednotky, caption, precision, subtables) |
            | `extract_table` | `et` | Extrakce dat z LaTeX tabulky zpět |

            **Grafy** (3 metody)

            | Metoda | Alias | Co dělá |
            |--------|-------|---------|
            | `graf` | `g` | 2D/3D grafy s fitem, chi-squared, panel reziduí, custom-fit |
            | `graf_interval` | `gi` | Graf funkce na zadaném intervalu |
            | `histogram` | `hist` | Histogram rozdělení s proloženou Gaussovkou |

            ## Použití

            ```bash
            # Linux (tar.gz)
            tar -xzf statistika_${{ github.ref_name }}_linux.tar.gz
            ./statistika_${{ github.ref_name }}_linux/statistika -h

            # Linux (AppImage)
            chmod +x Statistika-${{ github.ref_name }}-x86_64.AppImage
            ./Statistika-${{ github.ref_name }}-x86_64.AppImage -h

            # Windows
            .\statistika\statistika.exe -h

            # macOS
            tar -xzf statistika_${{ github.ref_name }}_macos.tar.gz
            ./statistika_${{ github.ref_name }}_macos/statistika -h

            # Docker
            docker run --rm -v "$PWD:/data" ghcr.io/matyas095/zm2_mereni:${{ github.ref_name }} ap -i mereni.txt

            # Přehled podporovaných SI jednotek
            ./statistika --list-units
            ```

            ## Co je nového

            - Nejistota typu B s podporou rovnoměrného, trojúhelníkového a normálního rozdělení
            - Detekce a odstranění outlierů (3σ, 2σ, N-σ, IQR)
            - Převod jednotek mezi SI prefixy (`--si-normalize`, `--convert-units`)
            - Chi-squared statistika s p-hodnotou a nejistotami parametrů fitu
            - Custom fit funkce v `graf` přes SymPy parser (`--custom-fit`)
            - Nová metoda `regrese` pro lineární regresi bez grafu
            - CASSY parser s autodetekcí formátu a desetinnou čárkou
            - LaTeX tabulky s auto-captionem, subtables a desetinnou čárkou
            - Konfigurační soubor `.zm2rc` pro výchozí hodnoty
            - Batch režim pro hromadné zpracování souborů
            - Programatické API (`import zm2`) pro volání z jiného Python kódu
            - Aliasy metod (`ap`, `nc`, `reg`, ...) pro rychlejší psaní

            Podrobný přehled změn v [CHANGELOG.md](https://github.com/matyas095/ZM2_Mereni/blob/main/CHANGELOG.md).

            > [!WARNING]
            > V datových souborech (formát `VELIČINA=data`) používáme desetinnou tečku, čárka je oddělovač hodnot. V LaTeX výstupu se čísla převádí na desetinnou čárku.

            ### Instalace certifikátu (jen Windows)

            Pro odstranění varování SmartScreenu při prvním spuštění `.exe` spustíme jednorázově přiložený skript `install_trust_windows.bat` jako administrátor — naimportuje veřejnou část podpisového certifikátu (`matyas095Gameing_public.crt`) do důvěryhodných kořenových certifikátů. Linuxová a macOS distribuce certifikát nevyžaduje.
          files: |
            statistika-linux/*.tar.gz
            statistika-linux/*.AppImage
            grafy-linux/*.tar.gz
            statistika-windows/*.zip
            grafy-windows/*.zip
            statistika-macos/*.tar.gz
            grafy-macos/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.PERSONAL_TOKEN_MAT }}

      - name: Discord Notification
        uses: sarisia/actions-status-discord@v1.15.3
        if: always()
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          status: ${{ job.status }}
          content: "Release ${{ github.ref_name }} dokončen — Statistika + Grafy (Linux + Windows + macOS, AppImage, Docker)"
