repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        name: Ruff lint
        args: [--fix]
      - id: ruff-format
        name: Ruff format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.20.2
    hooks:
      - id: mypy
        name: Mypy type-check
        additional_dependencies: [numpy, sympy]
        args: [--config-file=pyproject.toml]
        pass_filenames: false

  - repo: local
    hooks:
      - id: syntax-check
        name: Kontrola syntaxe Python souborů
        entry: bash -c 'python3 -m py_compile main.py main_statistika.py main_grafy.py utils.py && for f in statisticke_vypracovani/*/logic.py statisticke_vypracovani/base.py objects/*.py; do python3 -m py_compile "$f"; done'
        language: system
        pass_filenames: false
        files: '\.py$'

      - id: unit-tests
        name: Unit testy
        entry: python3 -m unittest discover tests
        language: system
        pass_filenames: false
        files: '\.py$'
