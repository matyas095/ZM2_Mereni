name: Build and Release
run-name: Release ${{ github.ref_name }}

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-statistika-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install
        run: |
          sudo apt-get update && sudo apt-get install -y upx
          pip install pyinstaller
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Build
        run: |
          pyinstaller --onedir --noconfirm --clean --strip \
          --name statistika_${{ github.ref_name }}_linux \
          --upx-dir /usr/bin \
          --add-data 'statisticke_vypracovani:statisticke_vypracovani' \
          --add-data 'objects:objects' \
          --add-data 'utils.py:.' \
          --add-data 'main.py:.' \
          --exclude-module IPython --exclude-module notebook \
          --exclude-module test --exclude-module tests \
          --exclude-module sklearn --exclude-module scikit-learn \
          --exclude-module pyarrow \
          --exclude-module matplotlib --exclude-module mpl_toolkits \
          --exclude-module PIL --exclude-module Pillow --exclude-module pillow \
          --exclude-module tkinter --exclude-module _tkinter \
          --exclude-module pandas --exclude-module openpyxl \
          --exclude-module fontTools --exclude-module contourpy --exclude-module kiwisolver \
          --exclude-module scipy.tests --exclude-module sympy.testing --exclude-module sympy.benchmarks \
          --collect-submodules sympy \
          --collect-submodules scipy \
          --hidden-import sympy.parsing.latex \
          --hidden-import sympy.parsing.sympy_parser \
          --hidden-import scipy.optimize \
          --hidden-import scipy.stats \
          --hidden-import scipy.linalg \
          --hidden-import statisticke_vypracovani.base \
          --hidden-import objects.measurement \
          --hidden-import objects.measurement_set \
          --hidden-import objects.input_parser \
          --hidden-import objects.config \
          --hidden-import objects.units \
          main_statistika.py

      - name: UPX & Cleanup
        run: |
          find dist/ -name "*.dist-info" -type d -exec rm -rf {} + 2>/dev/null || true
          find dist/ -name "__pycache__" -type d -exec rm -rf {} + 2>/dev/null || true
          find dist/statistika_${{ github.ref_name }}_linux -name "*.so" -o -name "*.so.*" | while read f; do
            upx -1 --quiet "$f" 2>/dev/null || true
          done

      - name: Package
        run: |
          cp security/matyas095Gameing_public.crt dist/statistika_${{ github.ref_name }}_linux/
          tar -czf statistika_${{ github.ref_name }}_linux.tar.gz -C dist .

      - uses: actions/upload-artifact@v4
        with:
          name: statistika-linux
          path: statistika_${{ github.ref_name }}_linux.tar.gz

  build-grafy-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install
        run: |
          sudo apt-get update && sudo apt-get install -y upx
          pip install pyinstaller
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Build
        run: |
          pyinstaller --onedir --noconfirm --clean --strip \
          --name statistika_grafy_${{ github.ref_name }}_linux \
          --upx-dir /usr/bin \
          --add-data 'statisticke_vypracovani:statisticke_vypracovani' \
          --add-data 'objects:objects' \
          --add-data 'utils.py:.' \
          --add-data 'main.py:.' \
          --exclude-module IPython --exclude-module notebook \
          --exclude-module test --exclude-module tests \
          --exclude-module sklearn --exclude-module scikit-learn \
          --exclude-module pyarrow \
          --exclude-module pandas --exclude-module openpyxl \
          --exclude-module matplotlib.tests --exclude-module scipy.tests \
          --exclude-module sympy.testing --exclude-module sympy.benchmarks \
          --collect-submodules sympy \
          --collect-submodules scipy \
          --collect-submodules matplotlib \
          --hidden-import sympy.parsing.latex \
          --hidden-import sympy.parsing.sympy_parser \
          --hidden-import scipy.optimize \
          --hidden-import scipy.stats \
          --hidden-import scipy.linalg \
          --hidden-import matplotlib \
          --hidden-import matplotlib.pyplot \
          --hidden-import matplotlib.backends.backend_agg \
          --hidden-import matplotlib.backends.backend_tkagg \
          --hidden-import PIL._tkinter_finder \
          --hidden-import tkinter \
          --hidden-import statisticke_vypracovani.base \
          --hidden-import objects.measurement \
          --hidden-import objects.measurement_set \
          --hidden-import objects.input_parser \
          --hidden-import objects.config \
          --hidden-import objects.units \
          main_grafy.py

      - name: UPX & Cleanup
        run: |
          find dist/ -name "*.dist-info" -type d -exec rm -rf {} + 2>/dev/null || true
          find dist/ -name "__pycache__" -type d -exec rm -rf {} + 2>/dev/null || true
          find dist/statistika_grafy_${{ github.ref_name }}_linux -name "*.so" -o -name "*.so.*" | while read f; do
            upx -1 --quiet "$f" 2>/dev/null || true
          done

      - name: Package
        run: |
          cp security/matyas095Gameing_public.crt dist/statistika_grafy_${{ github.ref_name }}_linux/
          tar -czf statistika_grafy_${{ github.ref_name }}_linux.tar.gz -C dist .

      - uses: actions/upload-artifact@v4
        with:
          name: grafy-linux
          path: statistika_grafy_${{ github.ref_name }}_linux.tar.gz

  build-statistika-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          if (Test-Path requirements.txt) { pip install -r requirements.txt }

      - name: Build
        run: |
          pyinstaller --onedir --noconfirm --clean --strip `
          --icon builder/app_icon.ico --name statistika `
          --add-data "statisticke_vypracovani;statisticke_vypracovani" `
          --add-data "objects;objects" `
          --add-data "utils.py;." `
          --add-data "main.py;." `
          --exclude-module IPython --exclude-module notebook `
          --exclude-module test --exclude-module tests `
          --exclude-module sklearn --exclude-module scikit-learn `
          --exclude-module pyarrow `
          --exclude-module matplotlib --exclude-module mpl_toolkits `
          --exclude-module PIL --exclude-module Pillow --exclude-module pillow `
          --exclude-module tkinter --exclude-module _tkinter `
          --exclude-module pandas --exclude-module openpyxl `
          --exclude-module fontTools --exclude-module contourpy --exclude-module kiwisolver `
          --exclude-module scipy.tests --exclude-module sympy.testing --exclude-module sympy.benchmarks `
          --collect-submodules sympy `
          --collect-submodules scipy `
          --hidden-import sympy.parsing.latex `
          --hidden-import sympy.parsing.sympy_parser `
          --hidden-import scipy.optimize `
          --hidden-import scipy.stats `
          --hidden-import scipy.linalg `
          --hidden-import statisticke_vypracovani.base `
          --hidden-import objects.measurement `
          --hidden-import objects.measurement_set `
          --hidden-import objects.input_parser `
          --hidden-import objects.config `
          --hidden-import objects.units `
          main_statistika.py

      - name: Sign EXE
        shell: pwsh
        run: |
          choco install osslsigncode -y
          $certBytes = [System.Convert]::FromBase64String("${{ secrets.PFX_BASE64 }}")
          Set-Content -Path cert.pfx -Value $certBytes -AsByteStream
          osslsigncode sign -pkcs12 cert.pfx -pass "${{ secrets.PFX_PASSWORD }}" `
          -n "Statistika ${{ github.ref_name }}" -t http://timestamp.digicert.com `
          -in dist/statistika/statistika.exe -out dist/statistika/statistika_signed.exe
          Remove-Item dist/statistika/statistika.exe
          Rename-Item dist/statistika/statistika_signed.exe statistika.exe
          Remove-Item cert.pfx

      - name: Package
        run: |
          copy security\matyas095Gameing_public.crt dist\statistika\
          $batch = @"
          @echo off
          cd /d "%~dp0"
          net session >nul 2>&1 || (echo Spustte jako administrator! & pause & exit)
          certutil -addstore -f "Root" "matyas095Gameing_public.crt"
          echo Certificate installed successfully.
          pause
          "@
          $batch | Out-File -FilePath dist\statistika\install_trust_windows.bat -Encoding ascii
          Compress-Archive -Path dist\statistika -DestinationPath statistika_${{ github.ref_name }}_windows.zip

      - uses: actions/upload-artifact@v4
        with:
          name: statistika-windows
          path: statistika_${{ github.ref_name }}_windows.zip

  build-grafy-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          if (Test-Path requirements.txt) { pip install -r requirements.txt }

      - name: Build
        run: |
          pyinstaller --onedir --noconfirm --clean --strip `
          --icon builder/app_icon.ico --name statistika_grafy `
          --add-data "statisticke_vypracovani;statisticke_vypracovani" `
          --add-data "objects;objects" `
          --add-data "utils.py;." `
          --add-data "main.py;." `
          --exclude-module IPython --exclude-module notebook `
          --exclude-module test --exclude-module tests `
          --exclude-module sklearn --exclude-module scikit-learn `
          --exclude-module pyarrow `
          --exclude-module pandas --exclude-module openpyxl `
          --exclude-module matplotlib.tests --exclude-module scipy.tests `
          --exclude-module sympy.testing --exclude-module sympy.benchmarks `
          --collect-submodules sympy `
          --collect-submodules scipy `
          --collect-submodules matplotlib `
          --hidden-import sympy.parsing.latex `
          --hidden-import sympy.parsing.sympy_parser `
          --hidden-import scipy.optimize `
          --hidden-import scipy.stats `
          --hidden-import scipy.linalg `
          --hidden-import matplotlib `
          --hidden-import matplotlib.pyplot `
          --hidden-import matplotlib.backends.backend_agg `
          --hidden-import matplotlib.backends.backend_tkagg `
          --hidden-import PIL._tkinter_finder `
          --hidden-import tkinter `
          --hidden-import statisticke_vypracovani.base `
          --hidden-import objects.measurement `
          --hidden-import objects.measurement_set `
          --hidden-import objects.input_parser `
          --hidden-import objects.config `
          --hidden-import objects.units `
          main_grafy.py

      - name: Sign EXE
        shell: pwsh
        run: |
          choco install osslsigncode -y
          $certBytes = [System.Convert]::FromBase64String("${{ secrets.PFX_BASE64 }}")
          Set-Content -Path cert.pfx -Value $certBytes -AsByteStream
          osslsigncode sign -pkcs12 cert.pfx -pass "${{ secrets.PFX_PASSWORD }}" `
          -n "Statistika Grafy ${{ github.ref_name }}" -t http://timestamp.digicert.com `
          -in dist/statistika_grafy/statistika_grafy.exe -out dist/statistika_grafy/statistika_grafy_signed.exe
          Remove-Item dist/statistika_grafy/statistika_grafy.exe
          Rename-Item dist/statistika_grafy/statistika_grafy_signed.exe statistika_grafy.exe
          Remove-Item cert.pfx

      - name: Package
        run: |
          copy security\matyas095Gameing_public.crt dist\statistika_grafy\
          $batch = @"
          @echo off
          cd /d "%~dp0"
          net session >nul 2>&1 || (echo Spustte jako administrator! & pause & exit)
          certutil -addstore -f "Root" "matyas095Gameing_public.crt"
          echo Certificate installed successfully.
          pause
          "@
          $batch | Out-File -FilePath dist\statistika_grafy\install_trust_windows.bat -Encoding ascii
          Compress-Archive -Path dist\statistika_grafy -DestinationPath statistika_grafy_${{ github.ref_name }}_windows.zip

      - uses: actions/upload-artifact@v4
        with:
          name: grafy-windows
          path: statistika_grafy_${{ github.ref_name }}_windows.zip

  create-release:
    needs: [build-statistika-linux, build-grafy-linux, build-statistika-windows, build-grafy-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          body: |
            # ZM2_Mereni ${{ github.ref_name }}

            Nástroj pro statistické zpracování fyzikálních laboratorních měření (ZM2 FJFI ČVUT).

            ## Stažení

            | Balík | Linux | Windows |
            |-------|-------|---------|
            | **Statistika** (výpočty) | `statistika_*_linux.tar.gz` | `statistika_*_windows.zip` |
            | **Grafy** (vizualizace) | `statistika_grafy_*_linux.tar.gz` | `statistika_grafy_*_windows.zip` |

            ## Metody

            **Statistika** (8 metod)

            | Metoda | Co dělá |
            |--------|---------|
            | `aritmeticky_prumer` | Průměr + chyba (typ A, B, kombinovaná dle GUM) |
            | `neprima_chyba` | Propagace chyby přes parciální derivace |
            | `vazeny_prumer` | Vážený průměr pro měření s rozdílnou přesností |
            | `derivace` | Numerická derivace (central differences) |
            | `convert_soubor` | Konverze TSV/CASSY do formátu `VELIČINA=data` |
            | `join_tables` | Spojení dvou LaTeX tabulek (horizontal / match) |
            | `format_table` | Úprava LaTeX tabulky (jednotky, caption, precision, subtables) |
            | `extract_table` | Extrakce dat z LaTeX tabulky zpět |

            **Grafy** (3 metody)

            | Metoda | Co dělá |
            |--------|---------|
            | `graf` | 2D/3D grafy s fitem, chi-squared, panel reziduí |
            | `graf_interval` | Graf funkce na zadaném intervalu |
            | `histogram` | Histogram rozdělení s proloženou Gaussovkou |

            ## Použití

            ```bash
            # Linux
            tar -xzf statistika_${{ github.ref_name }}_linux.tar.gz
            ./statistika_${{ github.ref_name }}_linux/statistika -h

            # Windows
            .\statistika\statistika.exe -h

            # Přehled podporovaných SI jednotek
            ./statistika --list-units
            ```

            ## Co je nového

            - Nejistota typu B s podporou rovnoměrného, trojúhelníkového a normálního rozdělení
            - Detekce a odstranění outlierů (3σ, 2σ, N-σ, IQR)
            - Převod jednotek mezi SI prefixy (`--si-normalize`, `--convert-units`)
            - Chi-squared statistika s p-hodnotou a nejistotami parametrů fitu
            - CASSY parser s autodetekcí formátu a desetinnou čárkou
            - LaTeX tabulky s auto-captionem, subtables a desetinnou čárkou
            - Konfigurační soubor `.zm2rc` pro výchozí hodnoty
            - Batch režim pro hromadné zpracování souborů

            Podrobný přehled změn v [CHANGELOG.md](https://github.com/matyas095/ZM2_Mereni/blob/main/CHANGELOG.md).

            > [!WARNING]
            > V datových souborech (formát `VELIČINA=data`) používáme desetinnou tečku, čárka je oddělovač hodnot. V LaTeX výstupu se čísla převádí na desetinnou čárku.

            ### Instalace certifikátu

            Pro odstranění varování Windows/Linux spustíme přiložený skript `install_trust` jako administrátor.
          files: |
            statistika-linux/*.tar.gz
            grafy-linux/*.tar.gz
            statistika-windows/*.zip
            grafy-windows/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.PERSONAL_TOKEN_MAT }}

      - name: Discord Notification
        uses: sarisia/actions-status-discord@v1.15.3
        if: always()
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          status: ${{ job.status }}
          content: "Release ${{ github.ref_name }} dokončen — Statistika + Grafy (Linux + Windows)"
