          --hidden-import objects.measurement_set \
          --hidden-import objects.input_parser \
          --hidden-import objects.config \
          --hidden-import objects.units \
          --hidden-import objects.logger \
          main_grafy.py

      - name: UPX & Cleanup
        run: |
          find dist/ -name "*.dist-info" -type d -exec rm -rf {} + 2>/dev/null || true
          find dist/ -name "__pycache__" -type d -exec rm -rf {} + 2>/dev/null || true
          find dist/statistika_grafy_${{ github.ref_name }}_linux -name "*.so" -o -name "*.so.*" | while read f; do
            upx -1 --quiet "$f" 2>/dev/null || true
          done

      - name: Package
        run: |
          cp security/matyas095Gameing_public.crt dist/statistika_grafy_${{ github.ref_name }}_linux/
          tar -czf statistika_grafy_${{ github.ref_name }}_linux.tar.gz -C dist .

      - uses: actions/upload-artifact@v6
        with:
