name: Build and Release
run-name: Release ${{ github.ref_name }}

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Build Tools
        run: |
          sudo apt-get update && sudo apt-get install -y zip upx
          pip install pyinstaller
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Build Linux Binary
        run: |
          pyinstaller --onefile --noconfirm --clean \
          --name statistika_${{ github.ref_name }}_linux \
          --upx-dir /usr/bin \
          --add-data 'statisticke_vypracovani:statisticke_vypracovani' \
          --add-data 'utils.py:.' \
          --exclude-module IPython --exclude-module notebook \
          --collect-submodules sympy \
          --collect-all matplotlib \
          --collect-all scipy \
          --collect-all scikit-learn \
          --hidden-import sympy.parsing.latex \
          --hidden-import sklearn \
          --hidden-import matplotlib.backends.backend_tkagg \
          main.py

      - name: Package Linux
        run: |
          cat <<EOF > dist/install_trust_linux.sh
          #!/bin/bash
          if [ "\$EUID" -ne 0 ]; then
            sudo "\$0" "\$@"
            exit \$?
          fi
          cp *.crt /usr/local/share/ca-certificates/
          update-ca-certificates
          EOF
          chmod +x dist/install_trust_linux.sh
          cp security/matyas095Gameing_public.crt dist/
          tar -czf statistika_${{ github.ref_name }}_linux.tar.gz -C dist .

      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifact
          path: statistika_${{ github.ref_name }}_linux.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          if (Test-Path requirements.txt) { pip install -r requirements.txt }

      - name: Build Windows EXE
        run: |
          pyinstaller --onefile --noconfirm --clean `
          --icon builder/app_icon.ico --name statistika `
          --add-data "statisticke_vypracovani;statisticke_vypracovani" `
          --add-data "utils.py;." `
          --exclude-module IPython --exclude-module notebook `
          --collect-all sympy `
          --collect-all matplotlib `
          --collect-all scipy `
          --collect-all scikit-learn `
          --hidden-import sympy.parsing.latex `
          --hidden-import sklearn `
          main.py

      - name: Sign EXE
        shell: pwsh
        run: |
          choco install osslsigncode -y
          $certBytes = [System.Convert]::FromBase64String("${{ secrets.PFX_BASE64 }}")
          Set-Content -Path cert.pfx -Value $certBytes -AsByteStream
          osslsigncode sign -pkcs12 cert.pfx -pass "${{ secrets.PFX_PASSWORD }}" `
          -n "Statistika Tool ${{ github.ref_name }}" -t http://timestamp.digicert.com `
          -in dist/statistika.exe -out dist/statistika_${{ github.ref_name }}_signed.exe
          Remove-Item cert.pfx

      - name: Package Windows
        run: |
          copy security\matyas095Gameing_public.crt dist\
          $batch = @"
          @echo off
          net session >nul 2>&1 || (echo Spustte jako administrator! & pause & exit)
          certutil -addstore -f "Root" "matyas095Gameing_public.crt"
          pause
          "@
          $batch | Out-File -FilePath dist\install_trust_windows.bat -Encoding ascii
          Compress-Archive -Path dist\*_signed.exe, dist\*.crt, dist\*.bat -DestinationPath statistika_${{ github.ref_name }}_windows.zip

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifact
          path: statistika_${{ github.ref_name }}_windows.zip

  create-release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          files: |
            linux-artifact/*.tar.gz
            windows-artifact/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.PERSONAL_TOKEN_MAT }}

      - name: Discord Notification
        uses: sarisia/actions-status-discord@v1
        if: always()
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          status: ${{ job.status }}
          content: "Build dokončen pro verzi ${{ github.ref_name }} (Python 3.12 nativně)"