name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Build Tools
        run: |
          sudo apt-get update && sudo apt-get install -y osslsigncode zip
          pip install pyinstaller numpy requests

      - name: Build Linux Binary
        run: |
          pyinstaller --onefile --name statistika_${{ github.ref_name }}_linux \
          --add-data 'statisticke_vypracovani:statisticke_vypracovani' main.py

      - name: Build Windows EXE
        run: |
          docker run --rm -v "$(pwd):/src" cdrx/pyinstaller-windows \
          "pip install numpy requests && pyinstaller --onefile --icon builder/app_icon.ico --name statistika --add-data 'statisticke_vypracovani;statisticke_vypracovani' main.py"

      - name: Sign Windows EXE
        run: |
          echo "${{ secrets.PFX_BASE64 }}" | base64 -d > cert.pfx
          osslsigncode sign -pkcs12 cert.pfx -pass "${{ secrets.PFX_PASSWORD }}" \
          -n "Statistika Tool ${{ github.ref_name }}" -t http://timestamp.digicert.com \
          -in dist/statistika.exe -out dist/statistika_${{ github.ref_name }}_signed.exe

      - name: Package Assets
        run: |
          cp security/matyas095Gameing_public.crt dist/
          cat <<EOF > dist/install_trust_windows.bat
          @echo off
          net session >nul 2>&1 || (echo ❌ Spusťte jako administrátor! & pause & exit)
          certutil -addstore -f "Root" "matyas095Gameing_public.crt"
          echo ✅ Certifikát nainstalován.
          pause
          EOF
          zip -j statistika_${{ github.ref_name }}_windows.zip dist/*_signed.exe dist/*.crt dist/*.bat

          cat <<EOF > dist/install_trust_linux.sh
          #!/bin/bash
          if [ "\$EUID" -ne 0 ]; then
            echo "🔐 Vyžadováno heslo pro instalaci certifikátu..."
            sudo "\$0" "\$@"
            exit \$?
          fi

          echo "⏳ Instaluji certifikát..."
          cp *.crt /usr/local/share/ca-certificates/
          update-ca-certificates
          echo "✅ Certifikát byl úspěšně přidán do systému!"
          EOF
          
          chmod +x dist/install_trust_linux.sh

          tar -czf statistika_${{ github.ref_name }}_linux.tar.gz -C dist \
          statistika_${{ github.ref_name }}_linux \
          matyas095Gameing_public.crt \
          install_trust_linux.sh

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }} - Statistické vypracování dat
          body: |
            ## 📊 Statistika Tool ${{ github.ref_name }}
            
            ### 🛠️ Změny v této verzi:
            - Automaticky sestaveno přes GitHub Actions.
            - Obsahuje Windows EXE (podepsané) a Linux binárku.
            
            ### 🔐 Instalace certifikátu:
            Pro odstranění varování Windows/Linux spusťte přiložený skript `install_trust` jako administrátor.

            # Statistické vypracování dat
            ## Metody
            - **aritmeticky_prumer** - Aritmetický průměr

            ## Statistické zpracování dat
            Následující seznam má následující strukturu
            - **název metody** - Napis
                - Popis
                - Vstup
                    - ...
                - Výstup
                    - ...

            Lze spustit automatické výpočty jako:
            - **aritmeticky_prumer** - Aritmetický průměr + Střední kvadratická chyba aritmetického průměru
                - Výpočet aritmetického průměru spolu se střední kvadratickou chybou
                - Vstup
                    - `soubor [txt, -, ...] {r}`
                        - *soubor* obsahuje veličiny a hodnoty ke zpracování metodou, jeho struktura je následující: `VELIČINA=DATA` s tím, že pro každou novou veličinu zadáme do nového řádku, příklad níže, nebo [zde](statisticke_vypracovani/aritmeticky_prumer/input/input_aritm_prumer) 
                            - U_0=2343,234,23423\
                              I_0=323,234928,1243
                - Výstup `print ->`
                    - VELIČINA\
                    ├──Aritmetický průměr = ČÍSLO\
                    └──Chyba aritmetického průměru = ČÍSLO

            > [!WARNING]
            > Čísla je NUTNÉ zapsat v . pokud jsou desetinné např.: 34.23, čárka , je pouze jako oddělovač dat.

            ### Vyvolávání metod
            Pro vyvolání metody použijeme soubor .exe v tomto releasu, která tyto metody modulárně vyvolává. A to ve formátu nejčastěji (zatím rozhodně) v CLI (Command Line Interface):
            ```pwsh
            .\statistika.exe -m METODA [-i CESTA_K_SOUBORU]
            ```

            Pro každou metodu volíme jeho název pro argument `METODA`, tedy první argument v listu, tedy to co je tučně vyznačené, např.: chci aritmetický průměr tak název metody je aritmeticky_prumer.

            Následně je nutné se zaměřit na vstup, vstupy jsou obecně zadaný a to ve formátu  `OBJEKT [TYP_OBJEKTU] {rwx}`, kde
            - `OBJEKT` je vstupní objekt, soubor, ...
            - `[TYP OBJEKTU]` jakej typ je objektu (clueless) např.: .txt, ...
            - `{rwx}` jsou oprávnění `r` - read (čtení), `w` - write (zápis), `x` - execute (provést), pokud `{rwx}` chybí, tak oprávnění nejsou žádáná

            pro každý vstup platí i určitá struktura, která je popsána pod `OBJEKT`

            > [!IMPORTANT]
            > Každej vstupní soubor MUSÍ splňovat podmínky vstupu jako vyznačený v listu výše.

            Pro výpis všech metod lze využít příkazu:
            ```pwsh
            .\statistika.exe -h
            ```

            #### Příklad
            ```pwsh
            .\statistika.exe -m aritmeticky_prumer -i input/KARL.txt
            ```
            ```bash
            ./statistika_linux -m aritmeticky_prumer -i input/KARL.txt
            ```
          files: |
            statistika_${{ github.ref_name }}_windows.zip
            statistika_${{ github.ref_name }}_linux.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Discord Notification
        uses: sarisia/actions-status-discord@v1
        if: always()
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          status: ${{ job.status }}
          content: ${{ job.status == 'success' && '**Nová verze je tu - masivní zprávy pro nezaměstnané**' || '❌ **Build se nepovedl!**' }}
          title: "Statistika Tool ${{ github.ref_name }}"
          description: "Build completed for ${{ github.ref_name }}. Check out the new version on GitHub!"
          url: "${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ github.ref_name }}"
          color: 0x00ff00